<!DOCTYPE html><html lang="es"><head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__PAGE_TITLE__</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.min.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;font-family:"Segoe UI",Tahoma,Arial,sans-serif;background:#edf3fa;color:#223046}
h1,h2,h3,p{margin:0}main{padding:.85%;display:block;width:100%;max-width:none;margin:0}
.hero,.card,.widget-card{background:#fff;border:1px solid #dbe5f1;border-radius:18px;box-shadow:0 12px 30px rgba(15,23,42,.08)}
.hero{padding:1.2%;background:linear-gradient(135deg,#0b2e4a 0%,#1d4ed8 100%);color:#fff}
.hero p{margin-top:8px;color:rgba(255,255,255,.82);line-height:1.5}
.stats{margin-top:1%;display:table;width:100%;table-layout:fixed;border-spacing:.8% 0}
.stats .stat{display:table-cell;vertical-align:top;padding:1%;border-radius:14px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16)}
.stat b{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.72)}
.stat span{display:block;margin-top:6px;font-size:1.45em;font-weight:700}
.chips{display:block;margin-top:.7%}
.chip{display:inline-block;margin:0 .6% .6% 0;padding:.45em .7em;border-radius:999px;background:#fff;color:#1d4ed8;border:1px solid #bfdbfe;font-size:12px;font-weight:600}
.chip.soft{background:#f8fafc;color:#475569;border-color:#dbe5f1}
.card,.widget-card{padding:1.1%}
.card + .card,.view > section,.dashboard-row + .dashboard-row{margin-top:1%}
.head,.card-head,.filter-head{display:block}
.card-head{margin-bottom:10px}
.card-head:after,.filter-head:after,.head:after{content:"";display:block;clear:both}
.head h2,.card-head h3{display:inline-block}
.head .meta,.card-head .meta{float:right}
.meta{font-size:12px;color:#667384}
.topnav{padding:.8%;display:table;width:100%;table-layout:fixed}
.tab-group{display:table-cell;vertical-align:middle}
.topnav .hint{display:table-cell;text-align:right;vertical-align:middle;font-size:13px;color:#64748b}
.tab-btn{display:inline-block;border:1px solid #bfdbfe;background:#fff;color:#1d4ed8;border-radius:10px;padding:.55em .8em;cursor:pointer;font-weight:700;white-space:nowrap;margin-right:.5%}
.tab-btn.active{background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 100%);color:#fff;border-color:transparent}
.view{display:none}
.view.active{display:block}
.step{padding:.8em .95em;border:1px solid #dbe5f2;border-radius:12px;background:#f8fbff;margin-bottom:.9%}
.step strong{color:#1d4ed8}
label{display:block;font-size:12px;font-weight:700;color:#667384;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
select,input,button,textarea{font:inherit}
select,input,textarea{width:100%;padding:.6em .72em;border:1px solid #cbd5e1;border-radius:10px;background:#fff;color:#223046}
textarea{resize:vertical;min-height:180px}
input[readonly]{background:#f8fafc;color:#64748b}
input[type=checkbox]{width:auto;padding:0;border:0;background:transparent;vertical-align:middle}
button{border:0;border-radius:10px;cursor:pointer;font-weight:700;padding:.68em .95em}
.btn{background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 100%);color:#fff}
.btn-soft{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.btn-soft.alt{background:#f8fafc;color:#334155;border:1px solid #dbe5f1}
.btn-danger{background:#fff1f2;color:#be123c;border:1px solid #fecdd3}
.notice{margin-top:12px;padding:12px 14px;border-radius:12px;border:1px solid #dbe5f1;background:#f8fbff;color:#334155;line-height:1.45}
.helper-box{padding:11px 12px;border-radius:12px;border:1px solid #dbe5f1;background:#f8fafc;min-height:44px;color:#475569;line-height:1.45}
.muted{font-size:12px;color:#667384;line-height:1.45}
.grid2,.field-table,.action-row,.tool-row,.filter-grid,.top-actions,.dashboard-row{display:table;width:100%;table-layout:fixed;border-spacing:.8% 0}
.grid2>div,.field-table>div,.action-row>div,.tool-row>div,.filter-grid>div,.top-actions>div,.dashboard-row>.dashboard-cell{display:table-cell;vertical-align:top}
.guide-grid{display:block;margin-top:12px}
.guide-card{display:inline-block;vertical-align:top;width:49.35%;margin-right:1.3%;padding:14px;border-radius:16px;border:1px solid #dbe5f1;background:#fff;box-shadow:0 8px 24px rgba(15,23,42,.04)}
.guide-card.last{margin-right:0}
.guide-card.full{display:block;width:100%;margin-right:0;margin-top:12px}
.flow-guide-grid{margin-top:12px}
.flow-guide-card{display:block;width:100%;margin-right:0;margin-top:0}
.flow-guide-card + .flow-guide-card{margin-top:12px}
.flow-setup-card .top-actions,.flow-setup-card .field-table,.flow-setup-card .tool-row{display:block}
.flow-setup-card .top-actions>div,.flow-setup-card .field-table>div,.flow-setup-card .tool-row>div{display:block;width:100%;margin-bottom:10px}
.flow-setup-card .top-actions>div:last-child,.flow-setup-card .field-table>div:last-child,.flow-setup-card .tool-row>div:last-child{margin-bottom:0}
.selected-band{padding:12px;border-radius:12px;border:1px solid #dbe5f1;background:#f8fafc;min-height:56px}
.selected-pill{display:inline-block;margin:0 8px 8px 0;padding:.42em .62em .42em .7em;border-radius:999px;background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;font-size:12px;font-weight:700}
.layout-editor-row,.wireframe-row{display:block}
.layout-editor-row + .layout-editor-row,.wireframe-row + .wireframe-row{margin-top:10px}
.row-box{padding:12px;border-radius:14px;border:1px solid #dbe5f1;background:#fbfdff}
.layout-chip{display:inline-block;padding:.35em .58em;border-radius:999px;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;font-size:11px;font-weight:700;margin:0 6px 6px 0}
.wireframe-grid{display:table;width:100%;table-layout:fixed;border-spacing:10px 0}
.wireframe-grid .wireframe-cell{display:table-cell;vertical-align:top}
.wf-btn{display:block;width:100%;text-align:left;padding:12px;border-radius:14px;border:1px solid #dbe5f1;background:linear-gradient(180deg,#fff 0%,#f8fbff 100%);min-height:108px;color:#223046}
.wf-btn b{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:#64748b}
.wf-btn span{display:block;margin-top:9px;font-size:16px;font-weight:700;color:#0f172a}
.wf-btn em{display:block;margin-top:8px;font-style:normal;font-size:12px;color:#667384}
.wf-btn.active{border-color:#1d4ed8;box-shadow:0 14px 30px rgba(37,99,235,.12)}
.wf-btn.kpi{border-left:5px solid #2563eb}
.wf-btn.table{border-left:5px solid #0f766e}
.wf-btn.chart{border-left:5px solid #ea580c}
.type-chooser{display:block;margin-top:12px}
.type-btn{display:inline-block;margin:0 8px 8px 0;padding:.6em .8em;border-radius:999px;border:1px solid #dbe5f1;background:#fff;color:#334155}
.type-btn.active{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
.widget-form{display:none;margin-top:12px}
.widget-form.active{display:block}
.cols{display:block;max-height:28vh;overflow:auto;padding:.3em;border:1px solid #dbe5f1;border-radius:12px;background:#fff;margin-top:12px}
.group-title{padding:10px 10px 8px 10px;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#64748b;background:#f8fafc;border-bottom:1px solid #e2e8f0}
.col-item{display:block;padding:9px 10px;border-bottom:1px solid #edf2f7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-item:last-child{border-bottom:0}
.col-item label{display:inline-block;max-width:92%;margin:0;font-size:13px;color:#334155;text-transform:none;letter-spacing:0}
.col-item input[type=checkbox]{margin-right:8px}
.type-pill{display:inline-block;margin-left:8px;padding:.22em .5em;border-radius:999px;background:#f8fafc;border:1px solid #dbe5f1;color:#64748b;font-size:11px;font-weight:700}
.filter-card{margin-top:10px;padding:12px;border-radius:14px;border:1px solid #dbe5f1;background:linear-gradient(180deg,#fff 0%,#fbfdff 100%)}
.filter-name{float:left;font-size:12px;font-weight:700;letter-spacing:.05em;color:#64748b;text-transform:uppercase}
.filter-remove{float:right;padding:.45em .7em;font-size:12px}
.filter-grid{border-spacing:10px 0}
.value-shell{min-height:39px}
.table-wrap{overflow:auto;border:1px solid #e2e8f0;border-radius:14px;background:#fafbfd}
table{width:100%;border-collapse:collapse;min-width:640px}
th,td{padding:10px 12px;border-bottom:1px solid #e2e8f0;font-size:13px;text-align:left;vertical-align:top}
thead th{background:#eff6ff;color:#1e3a8a;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
.canvas-wrap{position:relative;height:42vh;min-height:220px}
.widget-card{height:100%}
.widget-card.kpi-card .kpi-value{display:block;margin-top:10px;font-size:30px;font-weight:700;color:#0f172a}
.widget-card.kpi-card .kpi-label{display:block;font-size:12px;color:#667384;text-transform:uppercase;letter-spacing:.08em}
.widget-card.kpi-card .accent{display:block;width:44px;height:5px;border-radius:999px;margin-bottom:12px}
.widget-card .widget-title{display:inline-block;font-size:18px;color:#0f172a}
.widget-card .widget-meta{float:right;font-size:12px;color:#667384}
.widget-card .widget-desc{margin-top:8px;color:#667384;font-size:12px}
.empty{padding:22px;text-align:center;color:#667384;border:1px dashed #cbd5e1;border-radius:14px;background:#f8fafc}
#sourceTableBox{max-height:34vh;overflow:auto}
.hidden{display:none}
@media(max-width:1200px){main{padding:1%}.guide-card{width:100%;margin-right:0;margin-bottom:10px}.guide-card.last{margin-bottom:0}}
@media(max-width:980px){main{padding:.8%}.hero,.card,.widget-card{border-radius:14px}.hero{padding:1%}.card,.widget-card{padding:1%}.stats,.grid2,.field-table,.action-row,.tool-row,.filter-grid,.top-actions,.dashboard-row,.topnav,.wireframe-grid{display:block}.stats .stat,.grid2>div,.field-table>div,.action-row>div,.tool-row>div,.filter-grid>div,.top-actions>div,.dashboard-row>.dashboard-cell,.wireframe-grid .wireframe-cell{display:block;width:100%;margin-bottom:10px}.topnav .tab-group,.topnav .hint{display:block;width:100%}.topnav .hint{text-align:left;margin-top:.7%}.canvas-wrap{height:34vh;min-height:220px}table{min-width:520px}}
@media(max-width:700px){main{padding:.6%}.hero{padding:.9%}.card,.widget-card{padding:.9%}.hero p{font-size:13px}.stat span{font-size:18px}.tab-btn{display:block;width:100%;margin:0 0 8px 0;text-align:center}.type-btn{display:block;width:100%;margin-right:0}.canvas-wrap{height:30vh;min-height:180px}table{min-width:380px}th,td{padding:8px 9px;font-size:12px}#sourceTableBox{max-height:28vh}}
</style></head>
